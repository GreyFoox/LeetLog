<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LeetCode 刷题日志</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; padding: 10px; }
        .form-group { margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 4px; }
        button { padding: 8px 16px; margin-right: 8px; }
        .record { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .delete-btn { background-color: #ff4444; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📘 LeetCode 刷题日志</h2>

    <div class="form-group">
        <label>题号：</label>
        <input type="number" id="problemId" placeholder="例如 1">
    </div>
    <div class="form-group">
        <label>花费分钟数：</label>
        <input type="number" id="timeSpent" placeholder="例如 30">
    </div>
    <div class="form-group">
        <label>笔记：</label>
        <textarea id="note" rows="2" placeholder="可选的笔记"></textarea>
    </div>
    <button onclick="addRecord()">➕ 添加记录</button>
    <hr>

    <h3>📋 历史记录</h3>
    <div id="recordList"></div>

    <script>
        // ⚠️ 如果后端不在 localhost:5000，请修改这个地址
        const API_BASE = 'http://127.0.0.1:5000';

        async function fetchRecords() {
            const res = await fetch(`${API_BASE}/api/list`);
            const records = await res.json();
            renderRecords(records);
        }

        function renderRecords(records) {
            const container = document.getElementById('recordList');
            if (records.length === 0) {
                container.innerHTML = '<p>暂无记录，添加一条吧～</p>';
                return;
            }
            container.innerHTML = records.map(rec => `
                <div class="record">
                    <strong>题号 ${rec.problem_id}</strong> | 用时 ${rec.time_spent} 分钟<br>
                    📝 笔记：${rec.note || '无'}<br>
                    🕒 时间：${new Date(rec.created_at).toLocaleString()}
                    <button class="delete-btn" onclick="deleteRecord(${rec.id})">删除</button>
                </div>
            `).join('');
        }

        async function addRecord() {
            const problem_id = document.getElementById('problemId').value;
            const time_spent = document.getElementById('timeSpent').value;
            const note = document.getElementById('note').value;

            if (!problem_id || !time_spent) {
                alert('请填写题号和用时');
                return;
            }

            const res = await fetch(`${API_BASE}/api/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    problem_id: parseInt(problem_id),
                    time_spent: parseInt(time_spent),
                    note: note
                })
            });
            if (res.ok) {
                alert('添加成功');
                document.getElementById('problemId').value = '';
                document.getElementById('timeSpent').value = '';
                document.getElementById('note').value = '';
                fetchRecords();
            } else {
                alert('添加失败，请检查后端');
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除吗？')) return;
            const res = await fetch(`${API_BASE}/api/delete/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('删除成功');
                fetchRecords();
            } else {
                alert('删除失败');
            }
        }

        fetchRecords();
    </script>
</body>
</html>
